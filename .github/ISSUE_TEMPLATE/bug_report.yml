name: Bug report
description: Report incorrect behavior on the portfolio site or repository
title: '[Bug]: '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: Thank you for helping improve this portfolio. Do not include secrets or private data.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the observed behavior (page URL, broken link, build error, etc.).
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest reproducible example.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit, branch, or deploy date
  - type: checkboxes
    id: privacy
    attributes:
      label: Data-safety confirmation
      options:
        - label: I removed secrets, personal data, client data, and proprietary information.
          required: true
