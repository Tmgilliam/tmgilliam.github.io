name: Public Proof Gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  registry-gate:
    uses: Brilliant-Brainstorm-Intelligence-LLC/bbi-reusable-workflows/.github/workflows/public-proof-gate.yml@main
    with:
      registry_ref: main

  privacy:
    uses: Brilliant-Brainstorm-Intelligence-LLC/bbi-reusable-workflows/.github/workflows/privacy-boundary-scan.yml@main
    with:
      scan_path: .
